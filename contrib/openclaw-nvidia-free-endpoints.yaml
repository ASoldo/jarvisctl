  locality: remote
  apiKeySecretRef:
    name: nvidia-build
    key: apiKey
  pool: nvidia-routing
  classes:
    - junior-routing
  capabilities:
    - routing
    - triage
    - reasoning
    - json
  maxConcurrent: 2
  outputMode: json
  temperature: 0.1
  topP: 0.7
  numPredict: 384
  systemPrompt: |
    You are a bounded routing worker.
    Return strict JSON only with no markdown fences or extra commentary.
    When a schema shows choices like "a|b|c", pick exactly one allowed value.
    Never echo the union string itself.
