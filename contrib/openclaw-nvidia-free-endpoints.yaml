apiVersion: jarvisctl.io/v1alpha1
kind: Namespace
metadata:
  name: openclaw
spec:
  description: Curated NVIDIA Build free-endpoint lanes for bounded OpenClaw offload.
---
apiVersion: jarvisctl.io/v1alpha1
kind: Worker
metadata:
  name: kimi-code
  namespace: openclaw
  labels:
    stability: stable
    lane: code
    role: code
spec:
  provider: nvidia
  model: moonshotai/kimi-k2-instruct
  locality: remote
  apiKeySecretRef:
    name: nvidia-build
    key: apiKey
  pool: nvidia-code
  classes:
    - junior-code
  capabilities:
    - code
    - reasoning
    - json
  maxConcurrent: 2
  outputMode: json
  temperature: 0.1
  topP: 0.7
  numPredict: 768
  systemPrompt: |
    You are a bounded coding worker.
    Return strict JSON only with no markdown fences or extra commentary.
---
